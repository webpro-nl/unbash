<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>unbash playground</title>
    <style>
      * {
        margin: 0;
        box-sizing: border-box;
      }
      body {
        font-family: monospace;
        height: 100vh;
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto auto 1fr;
      }
      header {
        grid-column: 1 / -1;
        padding: 0.5rem 1rem;
        background: black;
        font-size: 1rem;
        text-align: right;
      }
      header a {
        color: whitesmoke;
        text-decoration: none;
      }
      textarea,
      #print {
        grid-column: 1;
      }
      textarea {
        padding: 1rem;
        border: none;
        border-right: 1px solid grey;
        border-bottom: 1px solid grey;
        outline: none;
        resize: none;
        height: 65vh;
      }
      #print {
        padding: 1rem;
        border-right: 1px solid grey;
        white-space: pre-wrap;
        word-break: break-word;
        overflow: auto;
        background: dimgray;
        color: whitesmoke;
      }
      #parse {
        white-space: pre;
        padding: 1rem;
        overflow: auto;
        background: whitesmoke;
        grid-column: 2;
        grid-row: 2 / -1;
      }
    </style>
  </head>
  <body>
    <header>
      <a href="https://github.com/webpro-nl/unbash">unbash <span id="version">2.1.0</span></a>
    </header>
    <textarea id="input" spellcheck="false">
echo "hello $USER"
for f in *.log; do
  cat "$f" | grep ERROR
done</textarea
    >
    <output id="parse"></output>
    <output id="print"></output>
    <script type="module">
      import { parse } from "/parser.js";
      import { print } from "/printer.js";
      const _input = document.getElementById("input");
      const _parse = document.querySelector("output#parse");
      const _print = document.querySelector("output#print");
      const update = () => {
        try {
          const src = _input.value;
          const ast = parse(src);
          _parse.textContent = JSON.stringify(ast, null, 2);
          _print.textContent = print(ast);
        } catch (e) {
          _parse.textContent = e.message;
          _print.textContent = e.message;
        }
      };
      _input.oninput = update;
      update();
    </script>
  </body>
</html>
